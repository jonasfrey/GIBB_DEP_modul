# Render Blueprint fuer Auftrag C3
# Erzeugt Web Service + Managed Postgres in einem Schritt.
# Anwendung: im Render-Dashboard "New +" -> "Blueprint" -> Repo waehlen -> diese Datei wird gefunden.
# Doku: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: dep-myapp-c3
    runtime: docker
    rootDir: auftrag3_cloud_render
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: dep-myapp-c3
      - key: APP_VERSION
        value: 1.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: dep-myapp-db
          property: connectionString

databases:
  - name: dep-myapp-db
    plan: free
    region: frankfurt
    databaseName: depmyapp
    user: depmyapp
