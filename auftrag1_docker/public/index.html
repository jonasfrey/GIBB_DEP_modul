<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEP – Eigene App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 24px; }
    .wrap { max-width: 760px; margin: 0 auto; }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .sub { color: #94a3b8; margin-bottom: 24px; }
    .card { background: #1e293b; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    h2 { font-size: 1rem; margin-bottom: 12px; color: #38bdf8; }
    dl { display: grid; grid-template-columns: 130px 1fr; gap: 6px 12px; font-size: 0.9rem; }
    dt { color: #94a3b8; }
    dd { font-family: monospace; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
    input { padding: 6px 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-family: monospace; }
    button { padding: 6px 14px; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .out { margin-top: 10px; font-family: monospace; font-size: 0.9rem; color: #a7f3d0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>DEP – Eigene App</h1>
    <p class="sub">Modul HFI_DEP · Containerized Node.js Demo</p>

    <div class="card">
      <h2>Status</h2>
      <dl>
        <dt>Hostname</dt><dd id="hostname">…</dd>
        <dt>Version</dt><dd id="version">…</dd>
        <dt>Timestamp</dt><dd id="timestamp">…</dd>
        <dt>App</dt><dd id="app">…</dd>
      </dl>
    </div>

    <div class="card">
      <h2>Info</h2>
      <dl>
        <dt>Name</dt><dd id="i-name">…</dd>
        <dt>Klasse</dt><dd id="i-class">…</dd>
        <dt>Hobby</dt><dd id="i-hobby">…</dd>
      </dl>
    </div>

    <div class="card">
      <h2>Primzahl-Check</h2>
      <div class="row">
        <input id="prime-n" type="number" value="97" min="0" max="1000000">
        <button onclick="checkPrime()">prüfen</button>
      </div>
      <div class="out" id="prime-out"></div>
    </div>

    <div class="card">
      <h2>Echo</h2>
      <div class="row">
        <input id="echo-msg" type="text" value="hallo deployment">
        <button onclick="doEcho()">senden</button>
      </div>
      <div class="out" id="echo-out"></div>
    </div>
  </div>

  <script>
    async function load() {
      const [s, i] = await Promise.all([
        fetch('/api/status').then(r => r.json()),
        fetch('/api/info').then(r => r.json())
      ]);
      hostname.textContent = s.hostname;
      version.textContent = s.version;
      timestamp.textContent = s.timestamp;
      app.textContent = s.app;
      document.getElementById('i-name').textContent = i.name;
      document.getElementById('i-class').textContent = i.class;
      document.getElementById('i-hobby').textContent = i.hobby;
    }
    async function checkPrime() {
      const n = document.getElementById('prime-n').value;
      const r = await fetch('/api/prime?n=' + encodeURIComponent(n)).then(r => r.json());
      document.getElementById('prime-out').textContent = JSON.stringify(r);
    }
    async function doEcho() {
      const m = document.getElementById('echo-msg').value;
      const r = await fetch('/api/echo/' + encodeURIComponent(m)).then(r => r.json());
      document.getElementById('echo-out').textContent = JSON.stringify(r);
    }
    load();
  </script>
</body>
</html>
