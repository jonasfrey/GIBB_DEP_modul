# C1 - Multi-Service-Architektur mit Docker Compose
# 3 Services: postgres (DB) <- web (Express) <- nginx (Reverse Proxy)
# Start: docker compose up --build
# Doku:  https://docs.docker.com/compose/
name: c1-stack

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-depmyapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
      POSTGRES_DB: ${POSTGRES_DB:-depmyapp}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-depmyapp} -d $${POSTGRES_DB:-depmyapp}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks: [app_net]

  web:
    build:
      context: ./web
    restart: unless-stopped
    environment:
      APP_NAME: dep-myapp-c1
      APP_VERSION: 1.0.0
      PORT: "3000"
      DATABASE_URL: postgres://${POSTGRES_USER:-depmyapp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-depmyapp}
      PGSSL: disable
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks: [app_net]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
    networks: [app_net]

networks:
  app_net:
    driver: bridge

volumes:
  pg_data:
