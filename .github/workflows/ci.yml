# CI/CD-Pipeline fuer Auftrag C2
# Stages: test -> build -> push (GHCR)
# Trigger: push/PR auf main, sowie manuell via workflow_dispatch
name: C2 CI/CD

on:
  push:
    branches: [main]
    paths:
      - "auftrag2_cicd_github_actions/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "auftrag2_cicd_github_actions/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  APP_DIR: auftrag2_cicd_github_actions
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dep-myapp

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Dependencies installieren
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests ausfuehren
        run: npm test

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Image bauen (lokal, ohne Push)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.APP_DIR }}
          file: ./${{ env.APP_DIR }}/Dockerfile
          push: false
          load: true
          tags: dep-myapp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-Test des Images
        run: |
          docker run -d --name smoke -p 3000:3000 dep-myapp:ci
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              echo "healthy"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:3000/api/health | grep -q '"status":"healthy"'
          docker logs smoke
          docker rm -f smoke

  push:
    name: GHCR Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags und Labels berechnen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
            type=ref,event=branch

      - name: Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.APP_DIR }}
          file: ./${{ env.APP_DIR }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
